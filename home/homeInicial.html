<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../styles/reset.css" />
    <link rel="stylesheet" href="../styles/main.css" />

    <style>
        .menu {
            width: 100%;
            height: 64px;
            background-color: #181d36;
            padding: 10px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logoNome {
            color: #ffe739;
            font-size: 24px;
            font-weight: bold;
        }

        .menu ul {
            font-size: 18px;
            color: #fff;

            display: flex;
            gap: 10px;
        }

        .cartIconeCont {
            height: 50px;
            width: 50px;
            background-color: #b4a320;

            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50px;

        }

        .containerMenuDireita{
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
    </style>
</head>

<body>
    <div class="menu">
        <h1 class="logoNome">GeekShop</h1>

        <div class="containerMenuDireita">
            <ul>
                <li>Produtos</li>
                <li>Sobre</li>
                <li>Contato</li>
            </ul>

            <div class="cartIconeCont">

                <img src="../Imagens/cart.svg" />

            </div>
        </div>
    </div>

    <div class="container_principal">

        <h1>Bem vindo a GeekShop</h1>
        <p>Encontre as melhores cartas para sua coleção.</p>
        <button>Explorar</button>

    </div>


    <script src="./home.js"></script>
</body>

</html>
