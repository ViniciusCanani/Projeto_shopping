<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="../styles/reset.css" />
    <link rel="stylesheet" href="../styles/main.css" />

    <style>
        .menu {
            width: 100%;
            height: 64px;
            background-color: #181d36;
            padding: 10px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logoNome {
            color: #ffe739;
            font-size: 24px;
            font-weight: bold;
        }

        .menu ul {
            font-size: 18px;
            color: #fff;

            display: flex;
            gap: 10px;
        }

        .cartIconeCont {
            height: 50px;
            width: 50px;
            background-color: #b4a320;

            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50px;

        }

        .containerMenuDireita {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .containerProdutos {
            width: 200px;
            background-color: rgb(148, 148, 148);

            display: flex;
            flex-direction: column;
            margin-top: 30px;
            gap: 10px;
        }

        .containerImagem{

            background-color: #ffe739;
            display: flex;
            padding: 0px 10px;
            height: auto;
        }

        .imagemCarta {
            width: 100%;
        }

        .textoProdutos{
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

    </style>
</head>

<body>
    <div class="menu">
        <h1 class="logoNome">GeekShop</h1>

        <div class="containerMenuDireita">
            <ul>
                <li>Produtos</li>
                <li>Sobre</li>
                <li>Contato</li>
            </ul>

            <div class="cartIconeCont">

                <img src="../Imagens/cart.svg" />

            </div>
        </div>
    </div>

    <div class="container_principal">

        <h1>Bem vindo a GeekShop</h1>
        <p>Encontre as melhores cartas para sua coleção.</p>
        <button>Explorar</button>

    </div>


    <div class="containerProdutos">
        <div class="containerImagem">
            <img src="https://images.ygoprodeck.com/images/cards/46986414.jpg" class="imagemCarta" />
        </div>

        <Div class="textoProdutos">
        <h3>Dark Magician</h3>
        <spam>ULTRA RARO</spam>
        <p>O mago mais iconico do Yu-Gi-Oh!</p>
        <span>$120.00</span>
        <button>Adicionar ao carrinho</button>
        </Div>
    </div>


    <script src="./home.js"></script>
</body>

</html>
