<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema</title>
    <script src="./script.js"></script>

    <style>
        body {
            background-color: #3fbba3;
        }

        .container_principal {
            background-color: #fff;
            justify-content: center;
            margin: 0 auto;
            width: 40%;
            margin: 80px auto;
            height: 500px;
            border-radius: 8px;
            padding: 20px;

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input {
            width: 100%;
            height: 54px;
            box-sizing: border-box;
            padding-left: 10px;
            margin-bottom: 20px;
            
        }

        .botao_entrar {
            width: 100px;
            height: 44px;
            border-radius: 8px;
            margin-top: 25px;
            color: #fff;
            background-color: #0b847a;
            border: none;
            cursor: pointer;
        }

        .botao_entrar:hover {
            background-color: #3daaa1;
        }

        .container_check{
            align-self: flex-start;
        }
    </style>

</head>

<body>

    <div class="container_principal">

        <h1>Login</h1>

        <input class="input" id="email" placeholder="Email" />

        <input class="input" id="senha" type="password" placeholder="Senha" />

        <div class="container_check" >
            <input type="checkbox" id="Exibir_senha" onclick="exibirSenha()"/>

            <label for="exibir_senha">Exibir senha</label>
        </div>

        <button class="botao_entrar" onclick="realizarLogin()">Entrar</button>

        <p>Ainda não tem conta? <a href="#">Crie agora</a></p>

    </div>

</body>

</html>
